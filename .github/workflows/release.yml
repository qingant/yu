name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14  # Apple Silicon (M1)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o yu-darwin-arm64 ./cmd/yu/

      - name: Import certificate and sign
        env:
          APPLE_SIGNING_KEY: ${{ secrets.APPLE_SIGNING_KEY }}
          APPLE_SIGNING_CERT: ${{ secrets.APPLE_SIGNING_CERT }}
        run: |
          # Decode key and cert
          echo -n "$APPLE_SIGNING_KEY" | base64 --decode > /tmp/dev.key
          echo -n "$APPLE_SIGNING_CERT" | base64 --decode > /tmp/dev.cer.pem

          # Build p12 on the runner itself (avoids openssl version mismatch)
          security create-keychain -p "" build.keychain-db
          security set-keychain-settings build.keychain-db
          security unlock-keychain -p "" build.keychain-db

          openssl pkcs12 -export -out /tmp/cert.p12 -inkey /tmp/dev.key -in /tmp/dev.cer.pem -password pass:build

          security import /tmp/cert.p12 -k build.keychain-db -P build -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "" build.keychain-db
          security list-keychains -d user -s build.keychain-db login.keychain-db

          # Sign
          codesign --sign "Developer ID Application" --options runtime --timestamp --force yu-darwin-arm64

          # Cleanup
          rm -f /tmp/dev.key /tmp/dev.cer.pem /tmp/cert.p12

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          zip yu-darwin-arm64.zip yu-darwin-arm64
          xcrun notarytool submit yu-darwin-arm64.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple yu-darwin-arm64 || true

      - name: Test
        run: go test ./internal/...

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: yu-darwin-arm64
